# Local-dev Postgres for the Tuna site (our linking/sessions DB — separate from
# Remnawave and the bot). Run:  docker compose up -d
services:
  db:
    image: postgres:17
    container_name: tuna-site-db
    environment:
      POSTGRES_USER: tuna
      POSTGRES_PASSWORD: tuna_local_dev
      POSTGRES_DB: tuna_site
      TZ: UTC
    ports:
      - "127.0.0.1:6790:5432"
    volumes:
      - tuna-site-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuna -d tuna_site"]
      interval: 3s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  tuna-site-db-data:
    name: tuna-site-db-data
