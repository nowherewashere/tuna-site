# Baked into the tuna-site image: serve the static SPA on :80.
# The front nginx (TLS termination + Cloudflare) proxies tuna-vpn.com here, and
# sends /api/v1/(public|connect) straight to the app. This server only serves
# static files — no API proxying, no TLS.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Homepage: serve the SPA shell directly. Needed as an exact match because the
    # true-404 `try_files` below no longer has a directory-index/SPA fallback, so a
    # bare "/" would otherwise 404. Exact-match locations win over the regex/prefix
    # ones below, so this only ever matches "/".
    location = / {
        try_files /index.html =404;
    }

    # Referral deep-links (/r/<code>) have no pre-rendered route under output:export
    # — the SPA boots from index.html with the code still in the URL (see RefCapture).
    # Keep the shell fallback ONLY here; every other unknown path must get a real 404
    # (below), so a crawler can actually detect a broken link instead of a 200 shell.
    location ~ ^/r/[A-Za-z0-9]+/?$ {
        try_files /index.html =404;
    }

    # Canonical URLs carry no trailing slash: 301 /oferta/ -> /oferta (root is exempt —
    # the regex needs at least one path char before the slash; hashed asset URLs never
    # end in a slash, so /_next/ and /assets/ are unaffected). Absolute https:// target:
    # this server sits behind the TLS-terminating front nginx over plain http, so a
    # relative redirect would resolve to http:// and downgrade the scheme.
    location ~ ^/(.+)/$ {
        return 301 https://$host/$1;
    }

    # Static export emits /login.html, /oferta.html, ...; serve the file (or <path>.html),
    # else a genuine 404 (error_page below) — no SPA catch-all, so soft-404s are gone.
    # ($uri as "/" is a directory hit -> index.html, so the homepage still resolves.)
    location / {
        try_files $uri $uri.html =404;
    }

    # Serve the built out/404.html with a real 404 status for any miss above.
    error_page 404 /404.html;

    # Hashed, immutable build assets — cache hard.
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
